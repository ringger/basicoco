[tool:pytest]
# Pytest configuration for TRS-80 Color Computer BASIC Emulator

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Add project root to Python path
addopts =
    --tb=short
    --strict-markers
    --strict-config
    --verbose
    -ra
    -m "not slow"

# Markers for organizing tests
markers =
    unit: Unit tests for individual components
    integration: Integration tests for component interactions
    e2e: End-to-end tests
    slow: Tests that take longer than 1 second
    graphics: Tests that involve graphics operations
    io: Tests that involve input/output operations
    cli: Tests that involve CLI interactions
    websocket: Tests that involve WebSocket functionality
    regression: Regression tests for specific bugs

# Minimum version
minversion = 6.0

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Test timeout (in seconds)
timeout = 300

# Parallel execution options
# Use with: pytest -n auto
# Requires pytest-xdist